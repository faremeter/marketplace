config:
  aws:region: us-west-2

  # DNS
  dns:rootZoneName: example.com # Primary domain for proxy subdomains
  dns:alternateZoneNames: '["example.io"]' # JSON array of alternate domains

  # EC2
  node:ami: ami-0123456789abcdef0 # Ubuntu AMI ID for the region

  # WireGuard (wg0 -- logging/monitoring network, connects to Grafana/Loki dashboard)
  wireguard:privateKey: <set-with-pulumi-config-set-secret> # Use: pulumi config set --secret wireguard:privateKey
  wireguard:publicKey: <your-wireguard-public-key>
  wireguard:address: 10.11.0.1 # wg0 IP address

  # WireGuard (wg1 -- internal service mesh, control-plane <-> API nodes)
  wireguard:multiAddress: 10.12.0.1 # wg1 IP address

  # Database
  database:host: <your-rds-endpoint> # RDS endpoint (from database-stack output)
  database:port: "5432"
  database:name: control_plane
  database:user: control_plane_1
  database:password: <set-with-pulumi-config-set-secret> # Use: pulumi config set --secret database:password

  # Wallet encryption
  wallet:encryptionKey: <set-with-pulumi-config-set-secret> # 64-char hex key. Use: pulumi config set --secret wallet:encryptionKey

  # Service ports
  ui:port: "1338" # Control-plane UI port
  controlPlane:port: "1337" # Control-plane API port
  controlPlane:nodeId: "1" # This node's ID in the database

  # VPC
  vpc:stackRef: <org>/vpc/<stack-name> # Pulumi stack reference for the VPC stack

  # External services
  facilitator:url: https://facilitator.example.com # x402 payment facilitator URL
  wireguard:dashboardPublicKey: <your-dashboard-wireguard-public-key> # WireGuard monitoring hub public key
  wireguard:dashboardEndpoint: dashboard.ops.example.com:51820 # WireGuard monitoring hub endpoint

  # Branding
  # site:name: Faremeter Marketplace                # Display name shown in UI
  # site:docsUrl: https://docs.faremeter.xyz        # Documentation URL
  # site:salesEmail: sales@faremeter.xyz            # Sales email address
  # site:supportUrl: https://support.example.com    # Support page URL
  site:letsencryptEmail: ops@example.com # Contact email for Let's Encrypt certificates


  # Optional integrations
  # faremeterDashboard:apiKey: <set-with-pulumi-config-set-secret>  # Use: pulumi config set --secret faremeterDashboard:apiKey
  # faremeterDashboard:apiUrl: https://dashboard.example.com/api/v1  # Dashboard API URL (required if apiKey is set)
  # attio:apiKey: <set-with-pulumi-config-set-secret>             # Use: pulumi config set --secret attio:apiKey
  # attio:listId: <your-attio-list-id>

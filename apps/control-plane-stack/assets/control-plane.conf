# NOTE: This file is not deployed directly. setup-machine.opsh generates the
# nginx config inline using PROXY_BASE_DOMAIN and PROXY_ALT_DOMAINS env vars.
# This file exists as a reference for the expected structure.

server {
    listen 80;
    server_name <PROXY_BASE_DOMAIN> <PROXY_ALT_DOMAINS>;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name <PROXY_BASE_DOMAIN> <PROXY_ALT_DOMAINS>;

    client_max_body_size 10m;

    include /etc/nginx/snippets/ssl-api.conf;
    include /etc/nginx/sites-available/control-plane.d/*.conf;
}

server {
    listen 127.0.0.1:3002;
    server_name localhost;

    set $word_dict_loaded '';

    location /free {
        content_by_lua_block {
            local dict = ngx.shared.word_dict
            if not dict:get("loaded") then
                local file = io.open("/usr/share/dict/words", "r")
                if file then
                    local i = 0
                    for line in file:lines() do
                        i = i + 1
                        dict:set(tostring(i), line)
                    end
                    dict:set("count", i)
                    dict:set("loaded", true)
                    file:close()
                end
            end
            local count = dict:get("count") or 0
            if count > 0 then
                math.randomseed(ngx.now() * 1000000 + (ngx.worker.id() or 0))
                local idx = math.random(1, count)
                ngx.say(dict:get(tostring(idx)))
            else
                ngx.say("error: no words loaded")
            end
        }
    }

    location /protected {
        content_by_lua_block {
            local dict = ngx.shared.word_dict
            local count = dict:get("count") or 0
            if count > 0 then
                math.randomseed(ngx.now() * 1000000 + (ngx.worker.id() or 0))
                local idx = math.random(1, count)
                ngx.say(dict:get(tostring(idx)))
            else
                ngx.say("error: no words loaded")
            end
        }
    }

    location / {
        return 404;
    }
}
